version: '3.8'

services:
  modelforge-backend:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
      - "9000-9100:9000-9100"
    volumes:
      - ../models:/app/models
      - ../config:/app/config
      - ../modelforge.db:/app/modelforge.db
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  modelforge-frontend-dev:
    image: node:20-slim
    working_dir: /app/frontend
    volumes:
      - ../frontend:/app/frontend
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    restart: unless-stopped
